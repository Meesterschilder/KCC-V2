services:
  - type: web
    name: msf-kcc
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: msf-kcc-db
          property: connectionString

databases:
  - name: msf-kcc-db
    plan: free
